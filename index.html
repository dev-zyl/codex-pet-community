<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="CodeX 宠物画廊 - 汇集了各种精美的 Codex 桌面宠物。在这里，您可以查看、下载、召唤您喜爱的桌宠，定制个性化风格，体验温馨有趣的桌面互动社区。" />
    <meta name="keywords" content="Codex, 桌宠, 桌面宠物, 宠物画廊, 桌面伴侣, 像素画廊, 互动宠物" />
    <title>Codex Pet Gallery</title>
    <link rel="preconnect" href="https://codexpet.xyz" />
    <link rel="stylesheet" href="./styles.css?v=design-polish-v2" />
  </head>
  <body>
    <a class="skipLink" href="#petGrid">跳到宠物列表</a>
    <main class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Codex Pet Community</p>
          <h1>CodeX 宠物画廊</h1>
        </div>
        <div class="topbarActions">
          <label class="themeSelectWrap">
            <span>风格</span>
            <span class="selectShell">
              <select id="themeSelect" aria-label="页面风格">
                <option value="showcase">展示橱窗</option>
                <option value="classic">清爽社区</option>
                <option value="compact">紧凑信息</option>
                <option value="dark">夜间像素</option>
                <option value="cartoon">卡通花园</option>
              </select>
            </span>
          </label>
        </div>
      </header>



      <section class="downloadGuide" aria-label="下载桌宠">
        <div>
          <p class="guideLabel">桌面端下载</p>
          <h2>先安装桌宠客户端，再从画廊召唤喜欢的 Codex 宠物。</h2>
          <p>前往 GitHub Releases 获取最新版桌宠客户端，项目源码、更新记录和问题反馈也都在同一个仓库里。</p>
        </div>
        <div class="guideActions">
          <a class="primaryGuideAction" href="https://github.com/ZhangYiLong416/DesktopPet/releases/latest" target="_blank" rel="noopener">下载最新版</a>
          <a class="secondaryGuideAction" href="https://github.com/ZhangYiLong416/DesktopPet" target="_blank" rel="noopener">查看 GitHub</a>
        </div>
      </section>

      <section class="controls" aria-label="筛选宠物">
        <form id="searchForm" class="search">
          <input id="searchInput" name="q" type="search" placeholder="输入宠物名称、作者或关键词…" autocomplete="off" />
          <button id="searchButton" type="submit">搜索</button>
          <button id="clearSearchButton" class="ghost" type="button">清空</button>
        </form>

        <div class="toolbar">
          <div class="segmented" aria-label="排序">
            <button class="active" data-sort="hot" type="button">热门</button>
            <button data-sort="latest" type="button">最新</button>
            <button data-sort="downloads" type="button">下载</button>
          </div>
          <button id="refreshButton" class="ghost" type="button">刷新</button>
        </div>

        <div id="tagBar" class="tags" aria-label="标签"></div>
        <div class="summaryRow">
          <div id="filterSummary" class="filterSummary" aria-live="polite"></div>
          <div class="stats inlineStats" aria-live="polite">
            <span id="totalCount">加载中</span>
          </div>
        </div>
      </section>

      <section id="status" class="status" aria-live="polite">正在加载Codex宠物...</section>
      <section id="petGrid" class="grid" aria-label="宠物列表"></section>

      <nav class="pager" aria-label="分页">
        <button id="prevPage" type="button">上一页</button>
        <span id="pageInfo">第 1 页</span>
        <button id="nextPage" type="button">下一页</button>
        <form id="jumpForm" class="jumpForm" aria-label="跳转到指定页">
          <label for="pageInput">跳转</label>
          <input id="pageInput" type="number" min="1" value="1" inputmode="numeric" />
          <button id="jumpButton" type="submit">Go</button>
        </form>
      </nav>

      <footer class="siteFooter">
        <div>
          <span>来源：</span>
          <a href="https://github.com/ZhangYiLong416/DesktopPet" target="_blank" rel="noopener">GitHub</a>
        </div>
        <p>声明：本站为 <a href="https://codexpet.xyz/zh" target="_blank" rel="noopener">https://codexpet.xyz/zh</a> 镜像站</p>
      </footer>


    </main>



    <template id="petCardTemplate">
      <article class="card">
        <button class="previewButton" type="button" aria-label="预览动画">
          <span class="sprite" aria-hidden="true"></span>
        </button>
        <div class="cardBody">
          <div class="titleRow">
            <h3></h3>
            <span class="version"></span>
          </div>
          <p class="desc"></p>
          <div class="meta"></div>
          <div class="cardTags"></div>
          <div class="actions">
            <a class="detail">查看</a>
            <a class="download">下载</a>
            <button class="summonPet" type="button">召唤</button>
            <button class="copyInstall" type="button">复制安装命令</button>
          </div>
        </div>
      </article>
    </template>



    <script src="./app.js?v=design-polish-v2"></script>
  </body>
</html>
