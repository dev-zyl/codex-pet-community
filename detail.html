<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Codex Pet Gallery 宠物详情页，提供高品质社区宠物包的详细信息、动画状态预览、精灵图展示及一键命令安装下载服务。" />
    <meta name="keywords" content="Codex Pet, 桌面宠物, 宠物包下载, 动画预览, 像素宠物, 精灵图" />
    <title>宠物详情 | Codex Pet Gallery</title>
    <link rel="stylesheet" href="./styles.css?v=lingopet-install-v2" />
  </head>
  <body>
    <main class="shell detailShell">
      <div class="detailTopbar">
        <a class="backLink" href="./index.html" aria-label="返回宠物画廊列表">返回列表</a>
        <label class="themeSelectWrap">
          <span>风格</span>
          <span class="selectShell">
            <select id="themeSelect" aria-label="页面风格">
              <option value="classic">清爽社区</option>
              <option value="compact">紧凑信息</option>
              <option value="showcase">展示橱窗</option>
              <option value="dark">夜间像素</option>
              <option value="cartoon">卡通花园</option>
            </select>
          </span>
        </label>
      </div>

      <section id="detailStatus" class="status" aria-live="polite">正在加载宠物详情...</section>

      <!-- 高保真 shimmer 流光骨架屏布局 -->
      <section id="detailSkeleton" class="detailSkeleton" aria-busy="true" aria-label="正在加载宠物详情，请稍候">
        <div class="skeletonHero">
          <div class="skeletonCopy">
            <div class="skeleton-item skeleton-kicker" aria-hidden="true"></div>
            <div class="skeleton-item skeleton-title" aria-hidden="true"></div>
            <div class="skeleton-item skeleton-desc-line1" aria-hidden="true"></div>
            <div class="skeleton-item skeleton-desc-line2" aria-hidden="true"></div>
            <div class="skeleton-item skeleton-desc-line3" aria-hidden="true"></div>
            <div class="skeleton-tags" aria-hidden="true">
              <div class="skeleton-item skeleton-chip"></div>
              <div class="skeleton-item skeleton-chip"></div>
              <div class="skeleton-item skeleton-chip"></div>
            </div>
            <div class="skeleton-item skeleton-stats" aria-hidden="true"></div>
            <div class="skeleton-actions" aria-hidden="true">
              <div class="skeleton-item skeleton-btn"></div>
              <div class="skeleton-item skeleton-btn"></div>
            </div>
          </div>
          <div class="skeletonPreview" aria-hidden="true">
            <div class="skeleton-item skeleton-sprite"></div>
          </div>
        </div>
      </section>

      <article id="detailView" class="detailView" hidden>
        <section class="detailHero">
          <div class="detailCopy">
            <p class="eyebrow" id="detailKicker">社区宠物包</p>
            <h1 id="detailTitle"></h1>
            <p id="detailDescription" class="detailDescription"></p>
            <div id="detailTags" class="cardTags"></div>
            <div id="detailStats" class="detailStats"></div>
            <div class="detailActions">
              <button id="detailInstallLingoPet" class="primaryAction" type="button" aria-label="安装该宠物到 LingoPet">安装到 LingoPet</button>
              <a id="detailDownload" class="secondaryAction" aria-label="下载该宠物的安装包文件">下载宠物包</a>
            </div>
          </div>

          <div class="detailPreview" aria-label="宠物动画预览">
            <span id="detailSprite" class="detailSprite" aria-hidden="true"></span>
          </div>
        </section>

        <section class="installPanel">
          <h2>安装</h2>
          <p>
            将宠物包放入
            <code id="installPath"></code>
          </p>
          <div class="commandBox">
            <code id="installCommand"></code>
            <button id="copyCommandInline" type="button" aria-label="复制当前行的 Powershell 安装命令">复制命令</button>
          </div>
          <p class="enableTip">启用：在 Codex 设置 -> 外观 -> 宠物中选择它。</p>
        </section>

        <section class="animationPanel">
          <div class="sectionTitleRow">
            <div>
              <p class="eyebrow">Animation States</p>
              <h2>动画状态</h2>
            </div>
            <span class="sectionNote">由 spritesheet 静态切片预览</span>
          </div>
          <div id="stateGrid" class="stateGrid"></div>
        </section>

        <section class="spritesheetPanel">
          <div class="sectionTitleRow">
            <div>
              <p class="eyebrow">Spritesheet</p>
              <h2>精灵图</h2>
            </div>
            <a id="spritesheetLink" class="secondaryAction" target="_blank" rel="noreferrer" aria-label="在新窗口中打开原图尺寸的精灵图">打开原图</a>
          </div>
          <div class="sheetFrame">
            <img id="spritesheetImage" alt="完整精灵图" />
          </div>
        </section>
      </article>
    </main>

    <script src="./detail.js?v=lingopet-install-v2"></script>
  </body>
</html>
